# Filter profiles + master firm list for the Summer 2027 intern monitor.
# Each profile has its own filter rules, Discord webhook (env-var lookup),
# and state file. One fetch run, N filter passes — postings that match
# multiple profiles get sent to multiple channels.

profiles:
  quant:
    webhook_env: DISCORD_WEBHOOK_URL
    state_file: state/postings_quant.json
    filters:
      must_include_any:
        - intern
        - internship
      must_include_role_any:
        - quant
        - quantitative
        - trader
        - trading
        - researcher
        - research
        - systematic
        - algorithmic
        - algo
      must_exclude_any:
        - software engineer intern
        - swe intern
        - hr intern
        - marketing
        - recruiting
        - operations intern
        - compliance intern
        - legal intern
        - audit intern
        - graphic
        - design intern
        - data engineer intern
      pass_year: "2027"
      reject_years: ["2024", "2025", "2026"]

  tech:
    webhook_env: DISCORD_WEBHOOK_URL_TECH
    state_file: state/postings_tech.json
    filters:
      # "Summer Analyst" / "Summer Associate" are how banks brand their intern
      # roles — without these, finance/S&T postings would all be rejected.
      must_include_any:
        - intern
        - internship
        - summer analyst
        - summer associate
      must_include_role_any:
        - software
        - swe
        - engineer
        - engineering
        - developer
        - programmer
        - data science
        - data scientist
        - data analyst
        - data analytics
        - machine learning
        - ml
        - ai
        - artificial intelligence
        - computer science
        - infrastructure
        - platform
        - devops
        - sre
        - security
        - frontend
        - backend
        - fullstack
        - full-stack
        - full stack
        - mobile
        - ios
        - android
        - web
        - cloud
        # Finance / S&T scope
        - finance
        - banking
        - investment banking
        - sales and trading
        - sales & trading
        - s&t
        - markets
        - capital markets
        - asset management
        - hedge fund
        - private equity
        - investment
        - analyst
      must_exclude_any:
        - hr intern
        - marketing
        - recruiting
        - operations intern
        - compliance intern
        - legal intern
        - audit intern
        - graphic
        - design intern
        - accounting intern
      pass_year: "2027"
      reject_years: ["2024", "2025", "2026"]

sources:
  simplify:
    primary: https://raw.githubusercontent.com/SimplifyJobs/Summer2027-Internships/dev/.github/scripts/listings.json
    fallback: https://raw.githubusercontent.com/SimplifyJobs/Summer2026-Internships/dev/.github/scripts/listings.json
  northwestern:
    api: https://api.github.com/repos/northwesternfintech/2027QuantInternships/contents/data
    raw_base: https://raw.githubusercontent.com/northwesternfintech/2027QuantInternships/main/data

# Per-firm config. `careers_url` is the page detect.py sniffs for an ATS embed.
# null means we have no canonical URL yet — the monitor logs it and skips.
# `ats` + `slug` is an explicit override that skips auto-detection (preferred
# when the careers page is bot-blocked or doesn't expose the embed in HTML).
# notify_on_close: true on a firm makes the diff send a "closed" embed when a posting disappears.
