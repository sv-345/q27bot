name: q27 monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "monitor.py"
      - "filters.py"
      - "detect.py"
      - "notify.py"
      - "sources/**"
      - "firms.yaml"
      - ".github/workflows/monitor.yml"

permissions:
  contents: write

concurrency:
  group: q27-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - run: python -m pytest tests/ -q
        env:
          PYTHONPATH: .

      # No --seed flag needed: monitor.py auto-detects empty state per profile
      # and uses the cold-start guardrail (single summary message instead of N pings).
      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_TECH: ${{ secrets.DISCORD_WEBHOOK_URL_TECH }}
          PYTHONPATH: .
        run: python monitor.py

      - name: Commit state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(state): refresh postings [skip ci]"
          file_pattern: "state/*.json firms_detected.json unsupported.log"
          commit_user_name: "q27bot"
          commit_user_email: "q27bot@users.noreply.github.com"
